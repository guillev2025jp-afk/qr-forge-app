<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Forge - Generador Profesional</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background: #f1f3f5;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 20px;
        }
        .qr-container {
            background: #ffffff;
            border-radius: 32px;
            max-width: 420px;
            width: 100%;
            padding: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.03);
            text-align: center;
        }
        /* Encabezado exacto de la captura */
        .header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 20px;
        }
        .title-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 6px;
        }
        .logo-box {
            width: 28px;
            height: 28px;
            border: 3px solid #6c757d;
            border-radius: 6px;
            background: #e9ecef;
        }
        h1 {
            font-size: 24px;
            font-weight: 700;
            color: #111827;
        }
        .subtitle {
            font-size: 14px;
            color: #6b7280;
        }
        /* Grilla de pestañas de categorías */
        .tabs-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-bottom: 20px;
        }
        .tab {
            background: #f1f3f5;
            border: none;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            color: #495057;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: all 0.2s;
        }
        .tab.active {
            background: #111827;
            color: #ffffff;
        }
        /* Campo de texto dinámico */
        .input-container {
            margin-bottom: 20px;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #dee2e6;
            border-radius: 14px;
            font-size: 14px;
            outline: none;
            background: #f8f9fa;
            color: #212529;
        }
        input[type="text"]:focus {
            border-color: #111827;
            background: #ffffff;
        }
        /* Contenedor gris central de la captura */
        .preview-box {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 200px;
            justify-content: center;
        }
        #qrcode {
            margin-bottom: 20px;
        }
        #qrcode img {
            display: block;
            background: #ffffff;
            padding: 8px;
            border-radius: 8px;
        }
        /* Botones de acción inferiores */
        .actions {
            display: flex;
            gap: 12px;
            width: 100%;
        }
        .btn {
            flex: 1;
            padding: 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.2s;
        }
        .btn-dark {
            background: #111827;
            color: #ffffff;
            border: none;
        }
        .btn-light {
            background: #ffffff;
            color: #111827;
            border: 1px solid #dee2e6;
        }
        /* Sección Historial idéntica a la imagen */
        .history-section {
            border-top: 1px solid #e9ecef;
            padding-top: 16px;
            text-align: left;
            margin-top: 16px;
        }
        .history-title {
            font-size: 15px;
            font-weight: 600;
            color: #111827;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .history-status {
            font-size: 13px;
            color: #495057;
            line-height: 1.4;
        }
        .history-note {
            font-size: 12px;
            color: #868e96;
            margin-top: 6px;
            display: block;
        }
    </style>
</head>
<body>

    <div class="qr-container">
        <div class="header">
            <div class="title-wrapper">
                <div class="logo-box"></div>
                <h1>QR Forge</h1>
            </div>
            <div class="subtitle">Genera cualquier código QR profesional</div>
        </div>

        <div class="tabs-container">
            <button class="tab active" onclick="changeType('URL', 'Ej: https://tu-sitio-web.com')">🔗 URL</button>
            <button class="tab" onclick="changeType('Texto', 'Escribí el texto aquí...')">📝 Texto</button>
            <button class="tab" onclick="changeType('WiFi', 'Ej: WIFI:S:NombreRed;T:WPA;P:Contraseña;;')">📶 WiFi</button>
            <button class="tab" onclick="changeType('vCard', 'Ej: NOMBRE:Guillermo;TEL:123456789;;')">👤 vCard</button>
            <button class="tab" onclick="changeType('Email', 'Ej: mailto:contacto@correo.com')">✉️ Email</button>
            <button class="tab" onclick="changeType('Teléfono', 'Ej: tel:+5493547...')">📞 Teléfono</button>
            <button class="tab" onclick="changeType('SMS', 'Ej: smsto:+5493547:Mensaje')">💬 SMS</button>
        </div>

        <div class="input-container">
            <input type="text" id="qr-input" placeholder="Ej: https://tu-sitio-web.com" oninput="generateQR()" autocomplete="off">
        </div>

        <div class="preview-box">
            <div id="qrcode"></div>
            
            <div class="actions">
                <button class="btn btn-dark" onclick="downloadPNG()">📸 Descargar PNG</button>
                <button class="btn btn-light" onclick="saveQR()">💾 Guardar</button>
            </div>
        </div>

        <div class="history-section">
            <div class="history-title">📜 Historial de QR</div>
            <div class="history-status" id="history-content">No hay QR guardados aún.</div>
            <span class="history-note">Los QR se guardan en tu dispositivo • Sin conexión después de primer uso</span>
        </div>
    </div>

    <script>
        let qrcodeElement = document.getElementById("qrcode");
        let qrInput = document.getElementById("qr-input");
        let qrcode = null;

        // Cambiar el placeholder según el tipo seleccionado
        function changeType(type, placeholderText) {
            document.querySelectorAll('.tab').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            qrInput.placeholder = placeholderText;
            qrInput.value = "";
            qrcodeElement.innerHTML = "";
        }

        // Generación dinámica al escribir
        function generateQR() {
            const currentText = qrInput.value.trim();
            qrcodeElement.innerHTML = "";

            if (currentText === "") return;

            qrcode = new QRCode(qrcodeElement, {
                text: currentText,
                width: 160,
                height: 160,
                colorDark : "#111827",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });
        }

        // Descarga directa de la imagen generada
        function downloadPNG() {
            const img = document.querySelector("#qrcode img");
            if (!img) {
                alert("Por favor, ingresá datos primero para poder generar y descargar el QR.");
                return;
            }
            const downloadLink = document.createElement("a");
            downloadLink.href = img.src;
            downloadLink.download = "qr-forge-code.png";
            document.body.appendChild(downloadLink);
            downloadLink.click();
            document.body.removeChild(downloadLink);
        }

        // Guardado local en el historial
        function saveQR() {
            const currentText = qrInput.value.trim();
            if (currentText === "") {
                alert("No hay información válida para guardar.");
                return;
            }
            const historyContent = document.getElementById("history-content");
            historyContent.innerHTML = `✓ Último guardado: <strong>${currentText}</strong>`;
        }
    </script>
</body>
</html>
