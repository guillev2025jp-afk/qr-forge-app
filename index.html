<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#007bff">
    <title>QR AI-ON - Agencia & Mentoría</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #f4f6f9; color: #333; padding: 20px; display: block; }
        .container { max-width: 500px; margin: 0 auto; background: #ffffff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { color: #007bff; font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
        .header p { color: #666; font-size: 14px; margin-top: 4px; font-weight: 500; }
        .tabs { display: block; border-bottom: 2px solid #eee; margin-bottom: 20px; white-space: nowrap; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .tab-btn { display: inline-block; padding: 10px 14px; background: none; border: none; font-size: 13px; font-weight: 600; color: #666; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; }
        .tab-btn.active { color: #007bff; border-bottom-color: #007bff; }
        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 12px; font-weight: 700; text-transform: uppercase; margin-bottom: 8px; color: #444; }
        input[type="text"] { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; outline: none; transition: border 0.2s; }
        input:focus { border-color: #007bff; }
        .drop-zone { border: 2px dashed #007bff; border-radius: 8px; padding: 30px 10px; text-align: center; background: #f8faff; cursor: pointer; display: none; }
        .drop-zone p { font-size: 13px; color: #555; font-weight: 500; }
        .drop-zone span { display: block; font-size: 11px; color: #888; margin-top: 5px; }
        .btn-main { width: 100%; background: #007bff; color: #fff; border: none; padding: 14px; border-radius: 6px; font-size: 15px; font-weight: 700; cursor: pointer; transition: background 0.2s; margin-bottom: 25px; }
        .btn-main:hover { background: #0056b3; }
        .preview-box { background: #f8f9fa; border: 1px solid #e9ecef; border-radius: 8px; padding: 20px; text-align: center; display: none; margin-bottom: 25px; }
        .preview-info { font-size: 12px; color: #666; margin-bottom: 15px; word-break: break-all; max-height: 40px; overflow: hidden; text-overflow: ellipsis; }
        .qr-wrapper { background: #fff; padding: 15px; display: inline-block; border-radius: 6px; border: 1px solid #dee2e6; margin-bottom: 15px; }
        .qr-wrapper canvas { display: block; margin: 0 auto; width: 250px; height: 250px; }
        .action-btns { display: block; text-align: center; }
        .btn-action { display: block; width: 100%; padding: 11px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; margin-bottom: 8px; }
        .btn-download { background: #111111; color: #fff; }
        .btn-save { background: #e2e8f0; color: #333; }
        .history-box { border-top: 1px solid #eee; padding-top: 20px; }
        .history-box h3 { font-size: 14px; color: #222; margin-bottom: 12px; }
        .history-list { list-style: none; max-height: 150px; overflow-y: auto; }
        .history-item { display: block; padding: 8px; background: #f8f9fa; border-radius: 4px; margin-bottom: 6px; font-size: 12px; color: #444; text-decoration: none; border-left: 3px solid #007bff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>QR AI-ON</h1>
        <p>Agencia & Mentoría</p>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('url')">🔗 URL</button>
        <button class="tab-btn" onclick="switchTab('wa')">💬 WhatsApp</button>
        <button class="tab-btn" onclick="switchTab('wifi')">📶 WiFi</button>
        <button class="tab-btn" onclick="switchTab('text')">📝 Texto</button>
        <button class="tab-btn" onclick="switchTab('email')">✉️ Email</button>
        <button class="tab-btn" onclick="switchTab('menu')">📋 Carta Menú</button>
    </div>

    <div class="input-group">
        <label id="input-label">Ingresar URL del sitio</label>
        <input type="text" id="main-input" placeholder="https://ejemplo.com">
        <div id="file-zone" class="drop-zone" onclick="document.getElementById('file-input').click()">
            <p>Seleccionar o arrastrar archivo de la Carta</p>
            <span>Soporta imágenes o PDF (Máx. 500kb para optimización)</span>
            <input type="file" id="file-input" style="display:none" accept="image/*,application/pdf" onchange="handleFile(this)">
        </div>
    </div>

    <button class="btn-main" onclick="generateQR()">Generar Código QR</button>

    <div class="preview-box" id="preview-container">
        <div class="preview-info" id="qr-meta"></div>
        <div class="qr-wrapper">
            <canvas id="qr-canvas-element"></canvas>
        </div>
        <div class="action-btns">
            <button class="btn-action btn-download" onclick="downloadPNG()">📸 Descargar PNG</button>
            <button class="btn-action btn-save" onclick="saveToHistory()">💾 Guardar</button>
        </div>
    </div>

    <div class="history-box">
        <h3>Historial Local</h3>
        <ul class="history-list" id="history-items"></ul>
    </div>
</div>

<script>
    let currentCategory = 'url';
    let menuDataUrl = '';
    let currentQRContent = '';
    let qrInstance = null;

    const placeholders = {
        url: { label: 'Ingresar URL del sitio', ph: 'https://ejemplo.com' },
        wa: { label: 'Número de WhatsApp (Con código de área)', ph: '54 9 3547 50-9528' },
        wifi: { label: 'Datos de red (Nombre,Clave,Seguridad)', ph: 'MiRed,Clave123,WPA' },
        text: { label: 'Texto plano a codificar', ph: 'Escriba aquí el contenido...' },
        email: { label: 'Dirección de correo electrónico', ph: 'destino@ejemplo.com' }
    };

    function switchTab(cat) {
        currentCategory = cat;
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        
        const mainInput = document.getElementById('main-input');
        const fileZone = document.getElementById('file-zone');
        const label = document.getElementById('input-label');

        if (cat === 'menu') {
            mainInput.style.display = 'none';
            fileZone.style.display = 'block';
            label.innerText = 'Subir archivo de Carta Menú';
        } else {
            mainInput.style.display = 'block';
            fileZone.style.display = 'none';
            label.innerText = placeholders[cat].label;
            mainInput.value = '';
            mainInput.placeholder = placeholders[cat].ph;
        }
    }

    function handleFile(input) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            menuDataUrl = e.target.result;
            document.querySelector('#file-zone p').innerText = `Archivo cargado: ${file.name}`;
        };
        reader.readAsDataURL(file);
    }

    function generateQR() {
        const mainInput = document.getElementById('main-input').value.trim();
        let finalContent = '';

        if (currentCategory === 'menu') {
            if (!menuDataUrl) return alert('Por favor, cargue un archivo primero.');
            finalContent = menuDataUrl;
        } else {
            if (!mainInput) return alert('Por favor, complete el campo requerido.');
            finalContent = mainInput;
        }

        if (currentCategory === 'wa') {
            let num = mainInput.replace(/\D/g, '');
            if (num.startsWith('549')) {
                num = num.substring(3);
            } else if (num.startsWith('54')) {
                num = num.substring(2);
            }
            if (num.startsWith('9') && num.length > 10) {
                num = num.substring(1);
            }
            if (num.startsWith('0')) {
                num = num.substring(1);
            }
            finalContent = `https://wa.me/54${num}`;
        }

        currentQRContent = finalContent;

        if(!qrInstance) {
            qrInstance = new QRious({
                element: document.getElementById('qr-canvas-element'),
                size: 250,
                level: 'M'
            });
        }
        qrInstance.value = finalContent;

        document.getElementById('qr-meta').innerText = `Contenido (${currentCategory.toUpperCase()}): ${finalContent}`;
        document.getElementById('preview-container').style.display = 'block';
    }

    function downloadPNG() {
        const baseCanvas = document.getElementById('qr-canvas-element');
        if (!baseCanvas) return;

        const downloadCanvas = document.createElement('canvas');
        downloadCanvas.width = 400;
        downloadCanvas.height = 450;
        const ctx = downloadCanvas.getContext('2d');

        // Fondo blanco e inmunidad de transparencias
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, downloadCanvas.width, downloadCanvas.height);

        // Borde estético perimetral
        ctx.strokeStyle = "#e9ecef";
        ctx.lineWidth = 4;
        ctx.strokeRect(10, 10, downloadCanvas.width - 20, downloadCanvas.height - 20);

        // Título de la Categoría
        ctx.fillStyle = "#333333";
        ctx.font = "bold 14px -apple-system, BlinkMacSystemFont, sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(`SERVICIO: ${currentCategory.toUpperCase()}`, downloadCanvas.width / 2, 40);

        // Estampado directo de canvas a canvas (Síncrono y libre de CORS de imágenes)
        ctx.drawImage(baseCanvas, 75, 70, 250, 250);

        // Metadata reducida
        ctx.fillStyle = "#666666";
        ctx.font = "11px sans-serif";
        let shortText = currentQRContent;
        if (shortText.length > 45) shortText = shortText.substring(0, 42) + "...";
        ctx.fillText(shortText, downloadCanvas.width / 2, 360);

        // Firma Corporativa de Autoridad
        ctx.fillStyle = "#007bff";
        ctx.font = "bold 13px sans-serif";
        ctx.fillText("Generado con QR AI-ON Agencia & Mentoría", downloadCanvas.width / 2, 405);

        // Forzar disparo de descarga
        const link = document.createElement('a');
        link.download = `qr-aion-${currentCategory}-${Date.now()}.png`;
        link.href = downloadCanvas.toDataURL('image/png');
        link.click();
    }

    function saveToHistory() {
        let history = JSON.parse(localStorage.getItem('qr_aion_history')) || [];
        const newItem = {
            category: currentCategory,
            content: currentQRContent,
            date: new Date().toLocaleDateString()
        };
        history.unshift(newItem);
        if (history.length > 10) history.pop();
        localStorage.setItem('qr_aion_history', JSON.stringify(history));
        loadHistory();
    }

    function loadHistory() {
        const history = JSON.parse(localStorage.getItem('qr_aion_history')) || [];
        const container = document.getElementById('history-items');
        container.innerHTML = '';
        history.forEach(item => {
            const li = document.createElement('li');
            li.className = 'history-item';
            li.innerText = `[${item.date}] (${item.category.toUpperCase()}): ${item.content}`;
            li.onclick = () => {
                if (item.category === 'menu') {
                    switchTab('menu');
                    menuDataUrl = item.content;
                    document.querySelector('#file-zone p').innerText = "Archivo cargado desde historial";
                } else {
                    switchTab(item.category);
                    document.getElementById('main-input').value = item.content;
                }
                generateQR();
            };
            container.appendChild(li);
        });
    }

    window.onload = function() {
        loadHistory();
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').catch(() => {});
        }
    };
</script>

</body>
</html>
