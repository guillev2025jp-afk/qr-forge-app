<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Forge - Generador Profesional</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }
        p {
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 20px;
            outline: none;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus {
            border-color: #007bff;
        }
        button {
            width: 100%;
            background: #007bff;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }
        button:hover {
            background: #0056b3;
        }
        #qrcode {
            margin-top: 25px;
            display: flex;
            justify-content: center;
        }
        #qrcode img {
            padding: 10px;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>QR Forge</h1>
        <p>Ingresá tu enlace o texto para generar el código QR al instante</p>
        
        <input type="text" id="qr-text" placeholder="Ej: https://tu-sitio-web.com" autocomplete="off">
        
        <button onclick="generateQR()">Generar Código QR</button>

        <div id="qrcode"></div>
    </div>

    <script>
        let qrcode = null;
        function generateQR() {
            const input = document.getElementById("qr-text").value.trim();
            const qrContainer = document.getElementById("qrcode");
            
            if (input === "") {
                alert("Por favor, ingresá un enlace o texto primero.");
                return;
            }
            
            // Limpiamos el QR anterior si existe
            qrContainer.innerHTML = "";
            
            // Generamos el nuevo QR
            qrcode = new QRCode(qrContainer, {
                text: input,
                width: 200,
                height: 200,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });
        }
    </script>
</body>
</html>
